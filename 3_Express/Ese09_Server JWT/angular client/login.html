<div class="container-fluid">
		<h1 class="text-center mb-5">Registrazione</h1>
		<form name="form1">
            <!--txtUser-->
            <div class="row">
                <div class="col-sm-4"></div>
                <div class="col-sm-4 form-group">
                    <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person-fill fs-4"> </i>
                    </span>
                    <input type="text" name='txtNominativo' class="form-control" placeholder="nominativo">
                    </div>
                </div>
                <div class="col-sm-4"></div>
            </div>

            <!--txtMail-->
            <div class="row">
                <div class="col-sm-4"></div>
                <div class="col-sm-4 form-group">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope-at-fill fs-4"> </i>
                        </span>
                        <input type="text" name='txtMail' class="form-control" placeholder="email">
                    </div>
                </div>
                <div class="col-sm-4"></div>
            </div>

            <!--txtPassword-->
            <div class="row">
                <div class="col-sm-4"></div>
                <div class="col-sm-4 form-group">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill fs-4"> </i>
                        </span>
                        <input type="password" name='txtPassword' class="form-control" placeholder="password">
                    </div>
                </div>
                <div class="col-sm-4"></div>
            </div>

            <!--txtResidenza-->
            <div class="row">
                <div class="col-sm-4"></div>
                <div class="col-sm-4 form-group">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill fs-4"> </i>
                        </span>
                        <input type="password" name='txtPassword2' class="form-control" placeholder="password">
                    </div>
                </div>
                <div class="col-sm-4"></div>
            </div>

            <!--txtDataNascita-->
            <div class="row">
                <div class="col-sm-4"></div>
                <div class="col-sm-4 form-group">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-calendar-date fs-4"> </i>
                        </span>
                        <input type="date" name='txtDataNascita' class="form-control" placeholder="data di nascita">
                    </div>
                </div>
                <div class="col-sm-4"></div>
            </div>

            <!-- Ok / Annulla -->
            <div class="row mt-4">
                <div class="col-sm-4"></div>
                <div class="col-sm-2 form-group text-end">
                    <button type="button" class="btn btn-secondary w-75 " id="btnOk">
                        OK
                    </button>
                </div>
                <div class="col-sm-2 form-group text-left"> 
                    <button type="button" class="btn btn-secondary w-75"
                           >
                        Annulla
                    </button>
                </div>
                <div class="col-sm-4"></div>
            </div>
		</form>		
    </div> <!-- end container -->
